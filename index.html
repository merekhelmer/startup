<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <!-- Tell browsers not to scale the viewport automatically -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreamSync - Home</title>
    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="main.css" />
    <!-- Include Bootstrap CSS Framework -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
      crossorigin="anonymous"
    />
    <!-- Favicon -->
    <link rel="icon" href="Logo.jpg" type="image/x-icon" />
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <a href="#" class="navbar-brand">
                <img src="Logo.jpg" alt="StreamSync Logo" class="logo">
                <span>StreamSync</span>
            </a>
            <menu>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="https://github.com/merekhelmer/startup.git" target="_blank">GitHub Repository</a></li>
            </menu>
        </nav>
        <!-- User Name Display -->
        <!-- TODO: Display logged-in user's name here -->
        <p class="welcome-message">Welcome, Merek!</p>
        <hr />
    </header>

    <!-- Main Content -->
    <main>
         <!-- Session Creation/Joining -->
         <section id="session-management">
            <h2>Start Your Movie Night</h2>
            <form id="session-form" method="post" action="#">
                <div class="form-group">
                    <button type="submit" formaction="index.html">Create New Session</button>
                </div>
                <div class="form-group">
                    <label for="session-code">Or Join with a Session Code:</label>
                    <input type="text" id="session-code" name="session-code" placeholder="e.g., ABC123" required />
                    <button type="submit" formaction="index.html">Join Session</button>
                </div>
            </form>
        </section>

        <!-- Preference Input -->
        <section id="preference-input">
            <h2>Select Your Preferences</h2>
            <form id="preferences-form" method="post" action="recommendations.html">
                <!-- Mood Selection with Emojis -->
                <div class="form-group">
                    <h3>Your Mood:</h3>
                    <div class="mood-options">
                        <label>
                            <input type="radio" name="mood" value="happy" required />
                            <span class="emoji" role="img" aria-label="Happy">😊</span>
                        </label>
                        <!-- Add more moods as needed -->
                    </div>
                </div>

    </main>
